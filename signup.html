<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
<!-- sign up form-->
    <div id="log">
        <h1>Create Account  </h1>
        <div id="newUserDiv"> Enter User name : <input type="text" id="newusername" placeholder="username"></div>
        <div id="newEmailDiv"> Enter Email : <input type="email" id="newemail" placeholder="Email"> </div>
        <div id="newPasswordDiv">  Enter Password : <input type="password" id="newpassword" placeholder="password"></div>
        <button type="button" id="signupBtn">Sign up</button>
        <p id="signupmsg"></p>
        <p>
            Already have an account?
            <a href="loginpage.html"> Login</a>
        </p>
    </div>
    </main>
    <script src="loginInfo.js"></script>
    <script src="signing.js"></script>
</body>
</html>
